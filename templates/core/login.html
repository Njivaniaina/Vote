{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto; margin-top: 2rem;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Authentification Électeur</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="unique_id" class="form-label">Numéro d'identité (NIN) ou Matricule</label>
            <input type="text" id="unique_id" name="unique_id" class="form-control" required autocomplete="off" placeholder="Entrez votre identifiant">
        </div>
        <div class="form-group">
            <label for="pin" class="form-label">Code PIN Secret</label>
            <input type="password" id="pin" name="pin" class="form-control" required placeholder="••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1rem;">S'authentifier pour Voter</button>
    </form>
</div>
{% endblock %}
