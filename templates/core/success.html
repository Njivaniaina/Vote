{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 3rem auto; text-align: center; padding: 3rem;">
    <div style="font-size: 5rem; margin-bottom: 1rem;">✅</div>
    <h2 style="color: var(--success-color); margin-bottom: 1rem;">A voté !</h2>
    <p style="font-size: 1.1rem; margin-bottom: 2rem;">
        Votre vote a été enregistré avec succès de manière sécurisée et anonyme. 
        Merci d'avoir accompli votre devoir.
    </p>
    <a href="{% url 'login' %}" class="btn btn-primary">Retour à l'accueil</a>
</div>
{% endblock %}
