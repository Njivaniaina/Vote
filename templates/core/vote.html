{% extends 'base.html' %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h2>Sélectionnez votre candidat</h2>
    <a href="{% url 'logout' %}" class="btn btn-outline" style="color: var(--danger-color); border-color: var(--danger-color);">Quitter</a>
</div>

<form method="POST">
    {% csrf_token %}
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 2rem; margin-bottom: 2rem;">
        {% for candidate in candidates %}
        <label class="card candidate-card" style="cursor: pointer; position: relative; display: block;">
            <input type="radio" name="candidate_id" value="{{ candidate.id }}" required style="position: absolute; top: 1rem; right: 1rem; transform: scale(1.5);">
            {% if candidate.photo %}
            <img src="{{ candidate.photo.url }}" alt="{{ candidate.name }}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 50%; margin: 0 auto 1rem auto; display: block;">
            {% else %}
            <div style="width: 100px; height: 100px; background-color: var(--border-color); border-radius: 50%; margin: 0 auto 1rem auto; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--text-secondary);">
                {{ candidate.name|make_list|first }}
            </div>
            {% endif %}
            <h3 style="text-align: center; margin-bottom: 0.5rem;">{{ candidate.name }}</h3>
            <p style="text-align: center; font-weight: 500; margin-bottom: 0.5rem;">{{ candidate.party }}</p>
            <p style="text-align: center; font-size: 0.9rem;">{{ candidate.description|truncatewords:20 }}</p>
        </label>
        {% endfor %}
    </div>
    
    <div class="card confirm-card" style="text-align: center; padding: 2rem; border: 2px solid var(--primary-color);">
        <h3 style="margin-bottom: 1rem;">Confirmez votre choix</h3>
        <p style="margin-bottom: 1.5rem;">Attention: Votre vote est définitif et restera anonyme. Une fois soumis, vous ne pourrez plus revoter.</p>
        <button type="submit" class="btn btn-primary" style="font-size: 1.2rem; padding: 1rem 2rem;">Voter Définitivement</button>
    </div>
</form>

<style>
.candidate-card {
    border: 2px solid transparent;
}
.candidate-card:has(input:checked) {
    border-color: var(--primary-color);
}
[data-theme="light"] .candidate-card:has(input:checked), [data-theme="light"] .confirm-card {
    background-color: rgba(59, 130, 246, 0.05);
}
[data-theme="dark"] .candidate-card:has(input:checked), [data-theme="dark"] .confirm-card {
    background-color: rgba(59, 130, 246, 0.15);
}
</style>
{% endblock %}
